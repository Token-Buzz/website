name: Deploy

# Mirrors the previous SST Console autodeploy workflow:
#   - push to master → production stage
#   - PR opened / synchronized / reopened → pr-<number> stage
#
# PR teardown lives in a separate workflow (teardown.yml) so a closed-PR
# event doesn't get tangled with a deploy run.

on:
  push:
    branches: [master]
    paths-ignore:
      - '**.md'
      - '.claude/**'
      - '.gitignore'
      - 'LICENSE'
  pull_request:
    types: [opened, synchronize, reopened]
    paths-ignore:
      - '**.md'
      - '.claude/**'
      - '.gitignore'
      - 'LICENSE'

# One deploy per stage at a time. Newer pushes cancel in-flight runs so we
# don't waste minutes deploying a commit that's already been superseded.
concurrency:
  group: deploy-${{ github.event_name == 'push' && 'production' || format('pr-{0}', github.event.pull_request.number) }}
  cancel-in-progress: true

permissions:
  contents: read
  # Required for OIDC: lets the runner mint a JWT that AWS STS will trade
  # for short-lived credentials via configure-aws-credentials.
  id-token: write

env:
  # Run the JS GitHub Actions themselves on Node 24. Node 20 is deprecated
  # for action runtimes (forced June 2026, removed Sept 2026). Doesn't
  # affect the Node version setup-node provisions for npm/tsc/next.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      AWS_REGION: us-east-1
      # Read by sst.config.ts via process.env at app() time.
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Resolve stage
        id: stage
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "name=production" >> "$GITHUB_OUTPUT"
          else
            echo "name=pr-${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: SST unlock
        run: npx sst unlock --stage ${{ steps.stage.outputs.name }}
        continue-on-error: true

      - name: SST deploy
        id: sst_deploy
        run: |
          set -o pipefail
          npx sst deploy --stage ${{ steps.stage.outputs.name }} \
            2>&1 | tee /tmp/sst-deploy.log

      - name: Surface deployment URLs
        if: success()
        run: |
          stage="${{ steps.stage.outputs.name }}"
          # SST prints stack outputs after a "✓  Complete" or "---" line in
          # the form "   <key>: <value>". Strip ANSI, then grab the trailing
          # key:value block.
          outputs=$(
            sed 's/\x1b\[[0-9;]*m//g' /tmp/sst-deploy.log \
              | awk '
                  /^---$|✓[[:space:]]+Complete/ { capture = 1; next }
                  capture && /^[[:space:]]+[A-Za-z][A-Za-z0-9_]*:[[:space:]]/ {
                    # SST prints each URL twice — once from each component'\''s
                    # auto-published .url property (Capitalised label) and once
                    # from the run() return in sst.config.ts (lowercase). Dedupe
                    # by URL value; first occurrence (capitalised) wins.
                    pos = index($0, ": ")
                    if (pos > 0) {
                      url = substr($0, pos + 2)
                      if (!seen[url]++) print
                    }
                  }
                '
          )

          # 1. Plain stdout — visible in the step log on mobile and desktop
          echo ""
          echo "================================================================"
          echo "  Deployment URLs — stage: ${stage}"
          echo "================================================================"
          if [ -n "$outputs" ]; then
            echo "$outputs"
          else
            echo "  (no outputs found in deploy log — check the SST deploy step)"
          fi
          echo "================================================================"
          echo ""

          # 2. GitHub Actions ::notice:: — surfaces in the run-page header
          # banner on every device including mobile. One notice per URL.
          if [ -n "$outputs" ]; then
            while IFS= read -r line; do
              # Trim leading whitespace
              trimmed="${line#"${line%%[![:space:]]*}"}"
              [ -z "$trimmed" ] && continue
              echo "::notice title=Deployed ${stage}::${trimmed}"
            done <<< "$outputs"
          fi

          # 3. Job summary — still nice on desktop
          {
            echo "## Deployment URLs — \`${stage}\`"
            echo ""
            echo '```'
            if [ -n "$outputs" ]; then
              echo "$outputs"
            else
              echo "(no outputs found in deploy log — check the SST deploy step)"
            fi
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
