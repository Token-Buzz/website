name: Deploy

# Mirrors the previous SST Console autodeploy workflow:
#   - push to master → production stage
#   - PR opened / synchronized / reopened → pr-<number> stage
#
# PR teardown lives in a separate workflow (teardown.yml) so a closed-PR
# event doesn't get tangled with a deploy run.

on:
  push:
    branches: [master]
  pull_request:
    types: [opened, synchronize, reopened]

# One deploy per stage at a time. Newer pushes cancel in-flight runs so we
# don't waste minutes deploying a commit that's already been superseded.
concurrency:
  group: deploy-${{ github.event_name == 'push' && 'production' || format('pr-{0}', github.event.pull_request.number) }}
  cancel-in-progress: true

permissions:
  contents: read
  # Required for OIDC: lets the runner mint a JWT that AWS STS will trade
  # for short-lived credentials via configure-aws-credentials.
  id-token: write

env:
  # Run the JS GitHub Actions themselves on Node 24. Node 20 is deprecated
  # for action runtimes (forced June 2026, removed Sept 2026). Doesn't
  # affect the Node version setup-node provisions for npm/tsc/next.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      AWS_REGION: us-east-1
      # Read by sst.config.ts via process.env at app() time.
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Resolve stage
        id: stage
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "name=production" >> "$GITHUB_OUTPUT"
          else
            echo "name=pr-${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: SST unlock
        run: npx sst unlock --stage ${{ steps.stage.outputs.name }}
        continue-on-error: true

      - name: SST deploy
        run: npx sst deploy --stage ${{ steps.stage.outputs.name }}

      - name: Write deployment URLs to job summary
        if: success()
        run: |
          stage="${{ steps.stage.outputs.name }}"
          {
            echo "## Deployment URLs — \`${stage}\`"
            echo ""
            echo '```'
            npx sst outputs --stage "$stage" || echo "(could not read outputs)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
