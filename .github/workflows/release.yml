name: Release

# release-please keeps an open "Release PR" on every push to master; merging
# that PR creates the vX.Y.Z tag + GitHub Release (rendered on the marketing
# /changelog page). Merging the Release PR is the release action.
on:
  push:
    branches: [master]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
