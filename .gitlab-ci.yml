default:
  image: node:20
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - ~/.npm
      - .next/cache/
      - .sst/platform/

stages:
  - validate
  - deploy
  - teardown

variables:
  AWS_DEFAULT_REGION: us-east-1

.aws_oidc:
  id_tokens:
    GITLAB_OIDC_TOKEN:
      aud: https://gitlab.com
  before_script:
    - apt-get update -qq && apt-get install -y -qq awscli
    - |
      CREDS=$(aws sts assume-role-with-web-identity \
        --role-arn "${AWS_ROLE_ARN}" \
        --role-session-name "gitlab-${CI_PROJECT_ID}-${CI_PIPELINE_ID}" \
        --web-identity-token "${GITLAB_OIDC_TOKEN}" \
        --duration-seconds 3600 \
        --query 'Credentials.[AccessKeyId,SecretAccessKey,SessionToken]' \
        --output text)
      export AWS_ACCESS_KEY_ID=$(echo "$CREDS" | awk '{print $1}')
      export AWS_SECRET_ACCESS_KEY=$(echo "$CREDS" | awk '{print $2}')
      export AWS_SESSION_TOKEN=$(echo "$CREDS" | awk '{print $3}')
    - |
      export CLOUDFLARE_API_TOKEN=$(aws ssm get-parameter \
        --name "/sst/website/${CI_ENVIRONMENT_NAME}/Secret/CloudflareApiToken/value" \
        --with-decryption \
        --query 'Parameter.Value' \
        --output text)
    - npm ci

validate:
  stage: validate
  script:
    - npm ci
    - npm run lint
    - npm run typecheck
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "dev"
    - if: $CI_COMMIT_BRANCH == "master"

deploy:dev:
  stage: deploy
  extends: .aws_oidc
  environment:
    name: dev
  script:
    - npx sst install --stage dev
    - npx sst deploy --stage dev
  rules:
    - if: $CI_COMMIT_BRANCH == "dev"

destroy:dev:
  stage: teardown
  extends: .aws_oidc
  environment:
    name: dev
    action: stop
  script:
    - |
      LAST_COMMIT_TS=$(git log -1 --format="%ct")
      NOW=$(date +%s)
      AGE=$((NOW - LAST_COMMIT_TS))
      echo "Last commit was $((AGE / 60)) minutes ago on branch ${CI_COMMIT_BRANCH}."
      if [ "$AGE" -gt 14400 ]; then
        echo "4-hour inactivity threshold reached. Tearing down dev environment."
        npx sst install --stage dev
        npx sst remove --stage dev
      else
        echo "Last commit within 4-hour window. Skipping teardown."
      fi
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule" && $CI_COMMIT_BRANCH == "dev"

deploy:production:
  stage: deploy
  extends: .aws_oidc
  environment:
    name: production
  script:
    - npx sst install --stage production
    - npx sst deploy --stage production
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
      when: manual
      allow_failure: false
